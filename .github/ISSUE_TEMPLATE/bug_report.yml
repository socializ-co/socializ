name: Bug report
description: Report a reproducible problem in Socializ.
title: '[Bug]: '
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please do not include secrets or personal data.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the observed behavior and the expected behavior.
      placeholder: Tell us what you expected and what happened instead.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Provide the smallest set of steps or a link to a minimal reproduction.
      placeholder: |
        1. Start ...
        2. Open ...
        3. Observe ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v0.1.0 or abc1234
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Web
        - API
        - Documentation
        - Libraries
        - Tooling or CI
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs and screenshots
      description: Remove secrets and private data before submitting logs.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues.
          required: true
        - label: I removed secrets and private data from this report.
          required: true
