name: Verify Enterprise Submodule

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: private-enterprise-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Check socializ-ee submodule
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository and private submodule
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive
          ssh-key: ${{ secrets.ENTERPRISE_DEPLOY_KEY }}
          persist-credentials: false

      - name: Verify private source tree
        run: test -f enterprise/libs/ac/src/domain/index.ts
