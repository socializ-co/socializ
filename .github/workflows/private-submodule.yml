name: Private EE submodule

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: private-enterprise-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Check socializ-ee submodule
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository and private submodule
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          submodules: recursive
          ssh-key: ${{ secrets.PRIVATE_SUBMODULE_SSH_KEY }}
          persist-credentials: false

      - name: Verify private source tree
        run: test -f enterprise/libs/ac/src/domain/index.ts
