name: Self-hosted Enterprise Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'ee-v*.*.*'

permissions:
  contents: read

concurrency:
  group: self-hosted-enterprise-release-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: socializ-co/socializ-ee

jobs:
  publish:
    name: Build EE self-hosted ${{ matrix.image }} image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: api
            dockerfile: apps/api/Dockerfile
          - image: web
            dockerfile: apps/web/Dockerfile
          - image: docs
            dockerfile: apps/docs/Dockerfile

    steps:
      - name: Check out repository and private enterprise submodule
        uses: actions/checkout@v7
        with:
          submodules: recursive
          ssh-key: ${{ secrets.ENTERPRISE_DEPLOY_KEY }}
          persist-credentials: false

      - name: Verify private enterprise source
        run: test -f enterprise/libs/ac/src/domain/index.ts

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.image }}
          tags: |
            type=ref,event=tag
            type=ref,event=branch
            type=sha,format=long,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha,scope=ee-self-host-${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=ee-self-host-${{ matrix.image }}
          provenance: mode=max
          sbom: true

      - name: Generate image attestation
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
